<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus - AI 코드 리뷰</title>
  <link rel="stylesheet" href="/styles.css?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="background-effects">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <main class="layout">
    <header class="hero">
      <div class="badge">AI 기반 코드 분석</div>
      <h1>지능형 코드 리뷰</h1>
      <p class="copy">
        공개 GitHub 저장소 주소를 입력해 코드를 인덱싱한 후,<br />
        원하는 질문을 던져 RAG 기반의 심층 분석 결과를 받아보세요.
      </p>
    </header>

    <div class="content-grid">
      <section class="panel form-panel glass">
        <!-- 자바스크립트 로직 유지를 위해 form id 유지 -->
        <form id="review-form">

          <!-- 1. 저장소 인덱싱 그룹 -->
          <div class="input-section">
            <h3 class="section-title">1. 저장소 인덱싱</h3>
            <div class="input-group">
              <label for="github_url">GitHub 저장소 URL</label>
              <input id="github_url" name="github_url" type="url" placeholder="https://github.com/user/repo" required />
            </div>
            <div class="actions">
              <button type="button" id="index-btn" class="btn btn-secondary">
                <span class="btn-text">코드 인덱싱 시작</span>
              </button>
            </div>
          </div>

          <hr class="divider" />

          <!-- 2. 리뷰 질문 및 실행 그룹 -->
          <div class="input-section">
            <h3 class="section-title">2. AI 리뷰 요청</h3>
            <div class="input-group">
              <label for="question">리뷰 질문 / 중점 사항</label>
              <textarea id="question" name="question" rows="4"
                placeholder="어떤 부분을 중점적으로 기획/분석해 드릴까요? (예: 성능 최적화, 엣지 케이스 확인 등)" required></textarea>
            </div>
            <div class="actions">
              <button type="submit" class="btn btn-primary">
                <span class="btn-text">AI 리뷰 실행</span>
              </button>
            </div>
          </div>

        </form>
      </section>

      <section class="panel result-panel glass">
        <div class="result-header">
          <h2>분석 결과</h2>
          <div id="download-actions" style="display: none; gap: 12px; align-items: center;">
            <button type="button" id="btn-download-md" class="btn btn-primary"
              style="padding: 8px 16px; font-size: 0.85rem;">📄 Markdown</button>
            <button type="button" id="btn-download-json" class="btn btn-secondary"
              style="padding: 8px 16px; font-size: 0.85rem;">💾 JSON</button>
          </div>
        </div>
        <div class="result-content">
          <pre id="result">입력을 기다리는 중입니다...</pre>
        </div>
      </section>
    </div>
  </main>

  <script src="/app.js?v=6"></script>
</body>

</html>
